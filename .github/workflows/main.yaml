name: Nodejs CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
    - run: npm install
    - run: npm test
      env:
        SQLITE_DB_LOCATION: /tmp/todos/todo.db
